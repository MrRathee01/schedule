name: Daily DevSync Update

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manual trigger for testing

jobs:
  automated_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: DevSync Task - 23f2004420@ds.study.iitm.ac.in
        run: |
          date >> daily_log.txt
          git config --local user.email "23f2004420@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Automation"
          git add daily_log.txt
          git commit -m "Automated daily sync: $(date)"
          git push
