name: Daily DevSync Update

on:
  schedule:
    - cron: '30 2 * * *' # Example: Runs at 02:30 UTC
  workflow_dispatch:

# ADD THIS SECTION
permissions:
  contents: write

jobs:
  automated_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Ensures the token is used for the push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: DevSync Task - 23f2004420@ds.study.iitm.ac.in
        run: |
          echo "Sync at $(date)" >> daily_log.txt
          git config --local user.email "23f2004420@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Automation"
          git add daily_log.txt
          git commit -m "Automated daily sync: $(date)"
          git push
